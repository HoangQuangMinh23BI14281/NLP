<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NLP NER Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div class="page-bg"></div>
    <main class="container">
        <header class="hero">
            <div class="hero-top">
                <p class="badge">NLP Demo</p>
                <p class="status-dot"><span></span>System Ready</p>
            </div>
            <h1>AI Job Matching Demo</h1>
            <p class="subtitle">Extract entities and show which companies match best with the provided profile or job text.</p>
        </header>

        <section class="card panel input-panel">
            <h2>Input Text</h2>
            <label class="field-wrap" for="input-text">Job Description or Candidate Text</label>
            <textarea id="input-text" rows="8" placeholder="We are looking for a Senior Java Developer with 5 years of experience in Spring Boot and AWS, located in Berlin, salary up to $5000/month."></textarea>
            <div class="actions">
                <button id="analyze-btn" type="button">Analyze Matching</button>
            </div>
            <p id="status" class="status hidden"></p>
        </section>

        <section id="result-card" class="card panel hidden">
            <h2>Matching Result</h2>

            <div id="missing-box" class="missing-box hidden">
                <h3>Add More Information</h3>
                <p id="missing-text"></p>
                <div id="missing-list" class="missing-list"></div>
            </div>

            <h3>Entities</h3>
            <div id="entity-list" class="entity-list"></div>

            <h3>Skill Coverage Across Companies</h3>
            <div id="skill-coverage" class="skill-coverage"></div>

            <h3>Top Company Matches</h3>
            <div id="match-grid" class="match-grid"></div>
        </section>
    </main>

    <div id="loader" class="loader hidden">
        <div class="spinner"></div>
        <p>Finding best company matches...</p>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
